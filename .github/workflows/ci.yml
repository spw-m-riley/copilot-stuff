name: Validate copilot config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate config and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Validate skill library
        run: node skills/skill-authoring/scripts/validate-skill-library.mjs

      - name: Validate workflow contracts
        run: |
          node skills/workflow-contracts/scripts/validate-contracts.mjs \
            skills/workflow-contracts/assets/planner-handoff-v1.md \
            skills/workflow-contracts/assets/review-outcome-v1.md \
            skills/workflow-contracts/assets/execution-record-v1.md

      - name: Validate Lore schema parity
        run: node extensions/lore/scripts/validate-config-schema.mjs

      - name: Run MA tests
        run: node --test extensions/ma/extension.test.mjs extensions/ma/runtime.test.mjs
